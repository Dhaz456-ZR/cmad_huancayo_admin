<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Administrativo | CMAC Huancayo</title>
    <link rel="stylesheet" href="/css/login_admin.css" />
    <link rel="icon" type="image/png" href="/img/Logo.jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />
</head>
<body>

    <div class="login-container">
        <!-- FONDO DECORATIVO -->
        <div class="login-bg">
            <div class="bg-circle bg-circle-1"></div>
            <div class="bg-circle bg-circle-2"></div>
            <div class="bg-circle bg-circle-3"></div>
        </div>

        <div class="login-box glass">
            
            <!-- HEADER -->
            <div class="login-header">
                <div class="logo-container">
                    <img src="/img/caja-huancayo-logo-png_seeklogo-437667.png" alt="CMAC Huancayo" class="logo" />
                </div>
                <h1>Panel Administrativo</h1>
                <p class="subtitle">Plataforma exclusiva para personal autorizado. Acceda utilizando sus credenciales institucionales.</p>
            </div>

            <!-- SECURITY BADGES -->
            <div class="security-badges">
                <span class="badge"><i class="fas fa-lock"></i> SSL/TLS</span>
                <span class="badge"><i class="fas fa-shield-alt"></i> Anti-Bots</span>
                <span class="badge"><i class="fas fa-clipboard-list"></i> Auditoría</span>
            </div>

            {% if error %}
            <div class="error-message">
                <i class="fas fa-exclamation-circle"></i> {{ error }}
            </div>
            {% endif %}

            <!-- FORM -->
            <form id="loginAdminForm" action="/admin/login" method="post">
                
                <div class="input-group">
                    <label><i class="fas fa-user"></i> Usuario</label>
                    <input type="text" name="email" placeholder="Ingrese su usuario" required />
                </div>

                <div class="input-group">
                    <label><i class="fas fa-lock"></i> Contraseña</label>
                    <input type="password" name="password" placeholder="Ingrese su contraseña" required />
                </div>

                <div class="form-row">
                    <div class="checkbox-group">
                        <input type="checkbox" name="remember" id="remember" />
                        <label for="remember">Mantener sesión iniciada</label>
                    </div>
                    <div class="verification-badge">
                        <i class="fas fa-shield-alt"></i> Verificación de Seguridad
                    </div>
                </div>

                <!-- CAPTCHA -->
                <div class="captcha-group">
                    <span class="captcha-text">6 + 10 = ?</span>
                    <input type="text" name="captcha" placeholder="Respuesta" maxlength="3" required />
                </div>

                <button type="submit" class="btn-login">
                    <i class="fas fa-sign-in-alt"></i> Ingresar al Sistema
                </button>

            </form>

            <!-- FOOTER -->
            <div class="login-footer">
                <a href="#" class="forgot-link">¿Olvidó su contraseña?</a>
                <div class="footer-copy">
                    <span>© 2026 CMAC Huancayo</span>
                    <span>Sistema Administrativo Seguro</span>
                </div>
            </div>

        </div>
    </div>

    <script src="/js/login_admin.js"></script>
</body>
</html>
